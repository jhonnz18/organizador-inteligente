name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; ffi

    - name: Lint with flake8 (Calidad de código)
      run: |
        pip install flake8
        # Detener si hay errores de sintaxis o variables no usadas
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statisticsls 